<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>Product Management Page</h2>

    <div class="product">
        <p><strong>Unit Price:</strong> 1000</p>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" min="0" value="0">

        <label>Total Price:</label>
        <input type="text" id="totalPrice" readonly value="0">
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
